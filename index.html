    async function checkAccess() {
      try {
        // طلب معلومات الـ IP والـ Privacy في دقة واحدة لتسريع العملية
        const response = await fetch(`https://ipinfo.io/json?token=${token}`);
        if (!response.ok) throw new Error('Network response was not ok');
        
        const data = await response.json();
        const userIP = data.ip;
        const userCountry = data.country;

        // 1. تشييك على الـ Blocked IPs
        const isBlocked = blockedIPs.some(blocked => {
            // كيشوف واش الـ IP كيبدا بهاد الأرقام (مفيدة للـ Ranges) أو كيتطابق معاه تماما

        });

        if (isBlocked) {
          console.warn("Blocked Access.");
          window.location.replace(fallbackSite);
          return;
        }

        // 2. تشييك على الـ Privacy (VPN/Proxy/Tor)
        // ملاحظة: ipinfo كتعطي معلومات الـ privacy فـ json واحد إلا كان الحساب ديالك فيه هاد الميزة
        // وإلا خاصنا نديرو fetch تانية كيف درتي فـ الكود ديالك
        const privacyResponse = await fetch(`https://ipinfo.io/${userIP}/privacy?token=${token}`);
        const privacyData = await privacyResponse.json();

        const isSafe = !privacyData.proxy && !privacyData.vpn && !privacyData.tor && !privacyData.relay;

        // 3. القرار النهائي

        } else {

        }
